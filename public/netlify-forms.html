<!DOCTYPE html>
<html>
  <head>
    <title>Netlify Forms</title>
  </head>
  <body>
    <!-- A hidden form to tell Netlify about the contact form -->
    <form name="contact" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="interest"></select>
      <textarea name="message"></textarea>
    </form>

    <!-- A hidden form to tell Netlify about the application form -->
    <form name="application" data-netlify="true" enctype="multipart/form-data" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="role"></select>
      <textarea name="coverLetter"></textarea>
      <input type="file" name="cv-upload" />
    </form>
  </body>
</html>
